{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 0;">
    <h1 style="font-size: 4rem; color: var(--danger-color); margin-bottom: 1rem;">404</h1>
    <h2 style="color: var(--primary-color); margin-bottom: 1rem;">Page Not Found</h2>
    <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
        The page you're looking for doesn't exist.
    </p>
    <a href="{{ url_for('main.index') }}" style="color: var(--secondary-color); text-decoration: none;">Go Home</a>
</div>
{% endblock %}
