{% extends "base.html" %}

{% block title %}Certificate Not Found - Digital Certificates{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 0;">
    <h1 style="color: var(--danger-color); margin-bottom: 1rem;">❌ Certificate Not Found</h1>
    <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
        The certificate you're looking for could not be found in our system.
    </p>
    <a href="{{ url_for('verify.verify_page') }}" style="color: var(--secondary-color); text-decoration: none;">Try another certificate</a>
</div>
{% endblock %}
