{% extends "base.html" %}

{% block title %}Verify Certificate - Digital Certificates{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 720px; margin: 0 auto;">
    <div class="panel">
        <div class="card-header" style="border-bottom: none;">
            <h1 style="margin:0;">🔍 Verify certificate</h1>
            <span class="badge badge-info">Public</span>
        </div>

        <div class="alert alert-info" style="margin-top: 0;">
            <div>Verify authenticity by searching the unique certificate ID (or use the QR code link).</div>
        </div>

        <div class="field mt-2">
            <label class="label" for="certificate_id">Certificate ID</label>
            <input type="text" id="certificate_id" placeholder="Paste certificate ID here...">
        </div>

        <button type="button" onclick="searchCertificate()" class="btn btn-primary btn-block mt-2">Search certificate</button>

        <div id="result" class="mt-3 hidden"></div>
    </div>
</div>

<script>
function searchCertificate() {
    const certificate_id = document.getElementById('certificate_id').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!certificate_id) {
        alert('Please enter a certificate ID');
        return;
    }
    
    // Simulate API call
    fetch('/verify/search', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ certificate_id: certificate_id })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            const cert = data.certificate;
            resultDiv.innerHTML = `
                <div class="alert alert-success">
                    <div style="width:100%;">
                        <h3 style="margin:0 0 0.5rem;">✓ Certificate verified</h3>
                        <p><strong>Name:</strong> ${cert.recipient_name}</p>
                        <p><strong>Course:</strong> ${cert.course_name}</p>
                        <p><strong>Date issued:</strong> ${cert.issue_date}</p>
                        <p><strong>Certificate ID:</strong> ${cert.uid}</p>
                        <p style="margin-bottom:0;"><strong>Verification count:</strong> ${cert.verification_count}</p>
                    </div>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="alert alert-danger">
                    <div style="width:100%;">
                        <h3 style="margin:0 0 0.5rem;">✗ Certificate not found</h3>
                        <p style="margin-bottom:0;">${data.message}</p>
                    </div>
                </div>
            `;
        }
        resultDiv.classList.remove('hidden');
    })
    .catch(error => {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                <div style="width:100%;">
                    <h3 style="margin:0 0 0.5rem;">Error</h3>
                    <p style="margin-bottom:0;">An error occurred while verifying the certificate.</p>
                </div>
            </div>
        `;
        resultDiv.classList.remove('hidden');
    });
}

// Allow Enter key to trigger search
document.getElementById('certificate_id').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        searchCertificate();
    }
});
</script>
{% endblock %}
